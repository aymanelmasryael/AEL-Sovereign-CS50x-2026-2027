name: AEL Sovereign CS50x Citadel CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows manual trigger from GitHub Actions UI

permissions:
  contents: read
  packages: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # Job 1: Build & Verify Production Container (Docker CI)
  build-container:
    name: Build NGINX Production Container
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker Image (Dry Run / Validation)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false # Set to true when publishing container publicly
          tags: ghcr.io/${{ github.repository }}/ael-cs50x-citadel:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Job 2: Deploy Static Citadel to GitHub Pages
  deploy-pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build-container # Only deploys if container build passes validation
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # Uploads entire static citadel root (docs.html, exams, IDE)

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
